<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos — MicroTienda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3e;
            --accent: #ff6584;
            --purple: #6c63ff;
            --green: #43e97b;
            --text: #e2e8f0;
            --muted: #8892a4;
            --error: #ff6584;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: 70px;
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: .9rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(15, 17, 23, .9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: .85rem;
            transition: color .2s;
        }

        nav a:hover {
            color: var(--text);
        }

        nav a.active {
            color: var(--accent);
            font-weight: 600;
        }

        .auth-pill {
            margin-left: auto;
            font-size: .78rem;
            padding: .3rem .9rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            background: transparent;
        }

        .auth-pill.on {
            border-color: rgba(67, 233, 123, .4);
            color: var(--green);
            background: rgba(67, 233, 123, .08);
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media(max-width:700px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: .4rem;
        }

        .sub {
            color: var(--muted);
            font-size: .85rem;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
        }

        label {
            display: block;
            font-size: .75rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: .35rem;
            margin-top: .9rem;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        label:first-of-type {
            margin-top: 0;
        }

        input,
        select {
            width: 100%;
            padding: .7rem .9rem;
            background: #0f1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            outline: none;
            transition: border-color .2s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            margin-top: 1.25rem;
            padding: .8rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }

        .btn:hover {
            opacity: .88;
        }

        .msg {
            margin-top: .75rem;
            font-size: .82rem;
            padding: .55rem .8rem;
            border-radius: 8px;
        }

        .msg.error {
            background: rgba(255, 101, 132, .1);
            border: 1px solid rgba(255, 101, 132, .3);
            color: var(--error);
        }

        .msg.success {
            background: rgba(67, 233, 123, .1);
            border: 1px solid rgba(67, 233, 123, .3);
            color: var(--green);
        }

        /* Preview del producto seleccionado */
        .prod-preview {
            margin-top: 1rem;
            background: #0f1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            display: none;
        }

        .prod-preview .pname {
            font-weight: 600;
            font-size: .95rem;
        }

        .prod-preview .pmeta {
            display: flex;
            gap: 1rem;
            margin-top: .4rem;
            font-size: .8rem;
            color: var(--muted);
        }

        .prod-preview .pprice {
            color: var(--green);
            font-weight: 600;
        }

        .total-box {
            margin-top: 1rem;
            text-align: right;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Lista de pedidos */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: .9rem;
            max-height: 540px;
            overflow-y: auto;
            padding-right: .25rem;
        }

        .order-item {
            background: #0f1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }

        .order-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: .5rem;
        }

        .order-product {
            font-weight: 600;
            font-size: .92rem;
        }

        .order-status {
            font-size: .7rem;
            padding: .2rem .6rem;
            border-radius: 999px;
            background: rgba(255, 101, 132, .12);
            border: 1px solid rgba(255, 101, 132, .25);
            color: var(--accent);
        }

        .order-meta {
            font-size: .78rem;
            color: var(--muted);
            margin-top: .4rem;
        }

        .order-price {
            font-size: .95rem;
            font-weight: 700;
            color: var(--green);
            margin-top: .35rem;
        }

        .empty-orders {
            text-align: center;
            color: var(--muted);
            padding: 2rem 0;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 1.5rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-auth {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }

        .no-auth a {
            color: var(--purple);
        }

        .service-badge {
            font-size: .7rem;
            padding: .2rem .65rem;
            border-radius: 999px;
            background: rgba(255, 101, 132, .1);
            border: 1px solid rgba(255, 101, 132, .25);
            color: var(--accent);
            margin-left: .6rem;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">⬅ Inicio</a>
        <a href="login.html">🔐 Login</a>
        <a href="productos.html">🛍️ Catálogo</a>
        <a class="active" href="pedidos.html">📦 Pedidos</a>
        <button class="auth-pill" id="auth-pill" onclick="logout()">Sin sesión</button>
    </nav>

    <main>
        <h1>📦 Mis Pedidos</h1>
        <p class="sub">Este módulo cruza datos de <strong>catalogo-service (Supabase)</strong> y <strong>pedidos-service
                (MongoDB)</strong></p>

        <div id="no-auth-msg" class="no-auth" style="display:none">
            ⚠️ Debes <a href="login.html">iniciar sesión</a> para ver y crear pedidos.
        </div>

        <div class="layout" id="main-layout" style="display:none">
            <!-- Formulario nuevo pedido -->
            <div>
                <div class="card">
                    <h2>✨ Nuevo Pedido</h2>
                    <form onsubmit="crearPedido(event)">
                        <label for="sel-producto">Selecciona un Producto <span
                                class="service-badge">Supabase</span></label>
                        <select id="sel-producto" onchange="actualizarPreview()" required>
                            <option value="">— Elige un producto —</option>
                        </select>

                        <div class="prod-preview" id="prod-preview">
                            <div class="pname" id="prev-nombre"></div>
                            <div class="pmeta">
                                <span id="prev-cat"></span>
                                <span>Stock: <strong id="prev-stock"></strong></span>
                                <span class="pprice" id="prev-precio"></span>
                            </div>
                        </div>

                        <label for="inp-cantidad">Cantidad</label>
                        <input id="inp-cantidad" type="number" min="1" value="1" required oninput="calcularTotal()">

                        <div class="total-box" id="total-box" style="display:none">
                            Total: <span id="total-val">$0.00</span>
                        </div>

                        <button type="submit" class="btn" id="btn-pedido">Crear Pedido</button>
                    </form>
                    <div class="msg" id="msg-pedido" style="display:none"></div>
                </div>
            </div>

            <!-- Lista de pedidos -->
            <div>
                <h2>📋 Historial <span class="service-badge"
                        style="background:rgba(108,99,255,.1);border-color:rgba(108,99,255,.3);color:var(--purple)">MongoDB</span>
                </h2>
                <div class="order-list" id="order-list">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_AUTH = 'http://localhost:8080/api/auth';
        const API_CATALOG = 'http://localhost:8080/api/catalogo';
        const API_ORDERS = 'http://localhost:8080/api/pedidos';

        let productos = [];

        function getToken() { return localStorage.getItem('token'); }
        function logout() { localStorage.removeItem('token'); location.reload(); }

        function actualizarPill() {
            const pill = document.getElementById('auth-pill');
            if (getToken()) {
                pill.textContent = '✅ Sesión activa · Salir';
                pill.classList.add('on');
            }
        }

        function mostrarMsg(id, txt, tipo) {
            const el = document.getElementById(id);
            el.textContent = txt; el.className = `msg ${tipo}`; el.style.display = 'block';
        }

        async function cargarProductos() {
            try {
                const res = await fetch(`${API_CATALOG}/products`);
                productos = await res.json();
                const sel = document.getElementById('sel-producto');
                productos.forEach(p => {
                    sel.innerHTML += `<option value="${p.id}">${p.nombre} — $${Number(p.precio).toLocaleString('es-MX', { minimumFractionDigits: 2 })}</option>`;
                });
            } catch (e) { console.error('Error cargando productos:', e); }
        }

        function actualizarPreview() {
            const id = document.getElementById('sel-producto').value;
            const prev = document.getElementById('prod-preview');
            if (!id) { prev.style.display = 'none'; document.getElementById('total-box').style.display = 'none'; return; }
            const p = productos.find(x => x.id === id);
            if (!p) return;
            document.getElementById('prev-nombre').textContent = p.nombre;
            document.getElementById('prev-cat').textContent = p.categoria_nombre || '';
            document.getElementById('prev-stock').textContent = p.stock ?? 0;
            document.getElementById('prev-precio').textContent = `$${Number(p.precio).toLocaleString('es-MX', { minimumFractionDigits: 2 })}`;
            prev.style.display = 'block';
            calcularTotal();
        }

        function calcularTotal() {
            const id = document.getElementById('sel-producto').value;
            const qty = parseInt(document.getElementById('inp-cantidad').value) || 1;
            const p = productos.find(x => x.id === id);
            if (!p) return;
            const total = p.precio * qty;
            document.getElementById('total-val').textContent = `$${total.toLocaleString('es-MX', { minimumFractionDigits: 2 })}`;
            document.getElementById('total-box').style.display = 'block';
        }

        async function crearPedido(e) {
            e.preventDefault();
            const id = document.getElementById('sel-producto').value;
            const qty = parseInt(document.getElementById('inp-cantidad').value);
            const p = productos.find(x => x.id === id);
            if (!p) return;

            const btn = document.getElementById('btn-pedido');
            btn.disabled = true; btn.textContent = 'Creando...';

            try {
                const res = await fetch(`${API_ORDERS}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({
                        product: p.nombre,         // nombre del producto (Supabase)
                        product_id: p.id,             // UUID de Supabase — relación lógica
                        quantity: qty,
                        price: p.precio * qty    // precio calculado
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || data.error || 'Error');
                mostrarMsg('msg-pedido', `✅ ${data.message} (ID: ${data.order_id})`, 'success');
                document.getElementById('prod-form')?.reset();
                setTimeout(cargarPedidos, 800);
            } catch (err) {
                mostrarMsg('msg-pedido', `❌ ${err.message}`, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Crear Pedido';
            }
        }

        async function cargarPedidos() {
            const list = document.getElementById('order-list');
            list.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await fetch(`${API_ORDERS}/orders`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const orders = await res.json();
                if (!orders.length) { list.innerHTML = '<p class="empty-orders">Aún no tienes pedidos 🛒</p>'; return; }
                list.innerHTML = orders.reverse().map(o => `
                <div class="order-item">
                    <div class="order-top">
                        <div class="order-product">${o.product}</div>
                        <span class="order-status">${o.status || 'pending'}</span>
                    </div>
                    <div class="order-meta">
                        Cantidad: <strong>${o.quantity}</strong>
                        ${o.product_id ? `· ID Catálogo: <code style="font-size:.7rem;color:var(--purple)">${o.product_id.substring(0, 8)}…</code>` : ''}
                    </div>
                    <div class="order-price">$${Number(o.price).toLocaleString('es-MX', { minimumFractionDigits: 2 })}</div>
                </div>`).join('');
            } catch (e) {
                list.innerHTML = '<p class="empty-orders">❌ Error al cargar pedidos</p>';
            }
        }

        // ── Init ─────────────────────────────────────────────────────────────────
        actualizarPill();
        if (getToken()) {
            document.getElementById('main-layout').style.display = 'grid';
            cargarProductos();
            cargarPedidos();
        } else {
            document.getElementById('no-auth-msg').style.display = 'block';
        }
    </script>
</body>

</html>
