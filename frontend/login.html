<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Registro — MicroTienda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3e;
            --accent: #6c63ff;
            --text: #e2e8f0;
            --muted: #8892a4;
            --success: #43e97b;
            --error: #ff6584;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(15, 17, 23, .85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: .85rem;
            transition: color .2s;
        }

        .nav a:hover {
            color: var(--text);
        }

        .nav a.home {
            color: var(--accent);
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: 440px;
            margin-top: 4rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: .4rem;
        }

        .sub {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .3rem;
            margin-bottom: 1.75rem;
            gap: .3rem;
        }

        .tab {
            flex: 1;
            padding: .6rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: .9rem;
            background: transparent;
            color: var(--muted);
            transition: all .2s;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }

        label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: .4rem;
            margin-top: 1.1rem;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        label:first-child {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: .75rem 1rem;
            background: #0f1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            transition: border-color .2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 1.5rem;
            padding: .85rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }

        button[type="submit"]:hover {
            opacity: .9;
        }

        button[type="submit"]:active {
            transform: scale(.98);
        }

        .msg {
            margin-top: 1rem;
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            display: none;
        }

        .msg.success {
            background: rgba(67, 233, 123, .12);
            border: 1px solid rgba(67, 233, 123, .3);
            color: var(--success);
            display: block;
        }

        .msg.error {
            background: rgba(255, 101, 132, .12);
            border: 1px solid rgba(255, 101, 132, .3);
            color: var(--error);
            display: block;
        }

        .token-box {
            margin-top: 1.5rem;
            background: #0f1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            display: none;
        }

        .token-box .token-label {
            font-size: .75rem;
            color: var(--muted);
            margin-bottom: .4rem;
        }

        .token-box code {
            font-size: .72rem;
            word-break: break-all;
            color: var(--accent);
        }

        .copy-btn {
            margin-top: .75rem;
            padding: .45rem .9rem;
            background: rgba(108, 99, 255, .15);
            border: 1px solid rgba(108, 99, 255, .3);
            border-radius: 7px;
            color: var(--accent);
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .copy-btn:hover {
            background: rgba(108, 99, 255, .25);
        }
    </style>
</head>

<body>
    <nav class="nav">
        <a class="home" href="index.html">⬅ Inicio</a>
        <a href="productos.html">🛍️ Catálogo</a>
        <a href="pedidos.html">📦 Pedidos</a>
    </nav>

    <div class="container">
        <h1>🔐 Autenticación</h1>
        <p class="sub">Servicio: <code>usuarios-service</code> · Node.js + MongoDB</p>

        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
        </div>

        <!-- Login -->
        <div class="card" id="form-login">
            <form onsubmit="handleLogin(event)">
                <label for="l-user">Usuario</label>
                <input id="l-user" type="text" placeholder="testuser" required autocomplete="username">
                <label for="l-pass">Contraseña</label>
                <input id="l-pass" type="password" placeholder="••••••••" required autocomplete="current-password">
                <button type="submit" id="btn-login">Iniciar Sesión</button>
            </form>
            <div class="msg" id="msg-login"></div>
            <div class="token-box" id="token-box">
                <div class="token-label">✅ Token JWT recibido (guardado en localStorage)</div>
                <code id="token-display"></code>
                <button class="copy-btn" onclick="copyToken()">📋 Copiar token</button>
            </div>
        </div>

        <!-- Register -->
        <div class="card" id="form-register" style="display:none">
            <form onsubmit="handleRegister(event)">
                <label for="r-user">Usuario</label>
                <input id="r-user" type="text" placeholder="miusuario" required autocomplete="username">
                <label for="r-pass">Contraseña</label>
                <input id="r-pass" type="password" placeholder="Mínimo 6 caracteres" required
                    autocomplete="new-password">
                <button type="submit" id="btn-register">Crear Cuenta</button>
            </form>
            <div class="msg" id="msg-register"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080/api/auth';

        function switchTab(tab) {
            document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg ${type}`;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = 'Iniciando...';

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('l-user').value,
                        password: document.getElementById('l-pass').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error de login');

                localStorage.setItem('token', data.token);
                showMsg('msg-login', '✅ Login exitoso', 'success');
                const box = document.getElementById('token-box');
                box.style.display = 'block';
                document.getElementById('token-display').textContent = data.token;
            } catch (err) {
                showMsg('msg-login', `❌ ${err.message}`, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Iniciar Sesión';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-register');
            btn.disabled = true; btn.textContent = 'Registrando...';

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('r-user').value,
                        password: document.getElementById('r-pass').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error');

                showMsg('msg-register', '✅ Cuenta creada. Ahora inicia sesión.', 'success');
                setTimeout(() => switchTab('login'), 1500);
            } catch (err) {
                showMsg('msg-register', `❌ ${err.message}`, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Crear Cuenta';
            }
        }

        function copyToken() {
            navigator.clipboard.writeText(localStorage.getItem('token') || '');
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '✅ Copiado'; setTimeout(() => btn.textContent = '📋 Copiar token', 2000);
        }

        // Si ya hay token, mostrar que tiene sesión
        if (localStorage.getItem('token')) {
            document.getElementById('token-box').style.display = 'block';
            document.getElementById('token-display').textContent = localStorage.getItem('token');
            showMsg('msg-login', '✅ Ya tienes una sesión activa', 'success');
        }
    </script>
</body>

</html>
