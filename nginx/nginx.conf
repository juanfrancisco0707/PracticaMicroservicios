events {}

http {
    upstream usuarios {
        server usuarios-service:3000;
    }

    upstream pedidos {
        server pedidos-service:8000;
    }

    upstream catalogo {
        server catalogo-service:3000;
    }

    server {
        listen 80;

        # ── Macro CORS: aplica a todos los location ──────────────────────
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        # Responder preflight OPTIONS inmediatamente
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location /api/auth/ {
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass http://usuarios;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/pedidos/ {
            rewrite ^/api/pedidos/(.*) /$1 break;
            proxy_pass http://pedidos;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/catalogo/ {
            rewrite ^/api/catalogo/(.*) /$1 break;
            proxy_pass http://catalogo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

